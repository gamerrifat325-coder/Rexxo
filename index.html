<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexxo Verse</title>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial}
header{background:black;padding:12px;font-weight:bold}
.container{padding:10px;margin-bottom:60px}
.video{background:#181818;padding:10px;border-radius:8px;margin-bottom:20px}

/* VIDEO SIZE SAME */
iframe{
width:100%;
height:220px;
border-radius:8px;
border:none
}

.bottom{position:fixed;bottom:0;width:100%;background:black;display:flex;justify-content:space-around;padding:10px 0}
button{background:none;color:white;border:none}
.hidden{display:none}

/* PREMIUM STYLE */
.package{
background:#181818;
padding:15px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.info-btn{
background:#2563eb;
border:none;
border-radius:50%;
width:20px;
height:20px;
color:white;
margin-left:5px;
}

#premiumModal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:80%;
max-width:300px;
color:white;
text-align:center;
z-index:1000;
}

#premiumModal button{
margin-top:10px;
padding:6px 12px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>Rexxo Verse</header>

<div class="container">

<div id="home">
<div class="video"><iframe src="https://www.youtube.com/embed/_kILtG5-2O0?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/8dlctkeNeYI?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/_9f6WVIoPsM?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/IJn94KJ8VO0?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/nBmnZV5y6rk?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/xxK7X6d6TL8?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/p2WTOtLvkyI?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/Mid4BbMYijg?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/y2hDNlkTo1c?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/KnZklF1tTjo?playsinline=1" allowfullscreen></iframe></div>
<div class="video"><iframe src="https://www.youtube.com/embed/k5w5qkZ2Te8?playsinline=1" allowfullscreen></iframe></div>
</div>

<!-- PREMIUM TAB -->
<div id="premium" class="hidden">
<h2>Premium</h2>

<div class="package" onclick="showRedeem()">
₹50 Package
<button class="info-btn" onclick="showInfo(event)">?</button>
</div>

<div id="redeemBox" class="hidden">
<br>
<input type="text" id="redeemCode" placeholder="Enter Redeem Code" style="padding:6px;border-radius:5px;border:none;width:70%;">
<button onclick="submitRedeem()" style="background:#22c55e;padding:6px 10px;border-radius:5px;border:none;color:white;">Submit</button>
</div>

</div>

<div id="me" class="hidden">
<h3>@rexxo_007</h3>
<p>All Shorts from YouTube</p>
</div>

</div>

<div class="bottom">
<button onclick="show('home')">Home</button>
<button onclick="show('premium')">Premium</button>
<button onclick="show('me')">Me</button>
</div>

<!-- PREMIUM MODAL -->
<div id="premiumModal" class="hidden">
<p>After purchasing Premium:<br>
- Upload Shorts<br>
- Edit Bio<br>
- Exclusive Features<br>
- Unlock Me tab insights</p>
<button onclick="closePremiumModal()">OK</button>
</div>

<script>
function show(id){
document.getElementById('home').classList.add('hidden');
document.getElementById('premium').classList.add('hidden');
document.getElementById('me').classList.add('hidden');
document.getElementById(id).classList.remove('hidden');
}

/* PREMIUM JS */
function showInfo(e){
e.stopPropagation();
document.getElementById("premiumModal").classList.remove("hidden");
}

function closePremiumModal(){
document.getElementById("premiumModal").classList.add("hidden");
}

function showRedeem(){
document.getElementById("redeemBox").classList.remove("hidden");
}

function submitRedeem(){
let code=document.getElementById("redeemCode").value;
if(!code) return alert("Enter Code");

let phone="919607903090";
let msg=encodeURIComponent("Premium Redeem Request\nCode: "+code);
window.open("https://wa.me/"+phone+"?text="+msg,"_blank");

localStorage.setItem("userPremium","true");
alert("Premium Activated!");
}
</script>

</body>
</html>
